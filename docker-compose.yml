# =============================================================
# docker-compose.yml — Study Task: полный стек
#
# Сервисы:
#   redis    — кэш + очередь задач
#   app      — Next.js приложение
#   worker   — Bull-воркер (фоновые задачи)
#   backup   — cron-контейнер для резервного копирования
#   nginx    — reverse proxy (раскомментировать для production)
#
# Запуск:
#   docker compose up -d
#
# Первый запуск (seed БД):
#   docker compose exec app sh -c "cd /app && npx prisma db seed"
# =============================================================

services:

  # ── Redis — кэш + очередь ───────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: studytask_redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --save ""
    ports:
      - "6379:6379"
    networks:
      - studytask_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Приложение ──────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    container_name: studytask_app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      JWT_SECRET: ${JWT_SECRET:-edu-platform-secret-change-me-in-production}
      DATABASE_URL: file:/app/prisma/dev.db
      REDIS_URL: redis://redis:6379
      NEXT_TELEMETRY_DISABLED: "1"
    volumes:
      - db_data:/app/prisma
      - backup_data:/app/backups
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/courses"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - studytask_net

  # ── Bull-воркер (фоновые задачи) ────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    container_name: studytask_worker
    restart: unless-stopped
    command: node src/workers/queue-worker.mjs
    environment:
      NODE_ENV: production
      DATABASE_URL: file:/app/prisma/dev.db
      REDIS_URL: redis://redis:6379
    volumes:
      - db_data:/app/prisma
    depends_on:
      redis:
        condition: service_healthy
      app:
        condition: service_healthy
    networks:
      - studytask_net

  # ── Cron-бэкап ──────────────────────────────────────────────────────────
  backup:
    image: node:20-alpine
    container_name: studytask_backup
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    environment:
      BACKUP_KEEP_DAYS: ${BACKUP_KEEP_DAYS:-7}
    volumes:
      - db_data:/app/prisma:ro
      - backup_data:/app/backups
      - ./scripts:/scripts:ro
    command: >
      sh -c "
        apk add --no-cache sqlite dcron &&
        mkdir -p /var/log /etc/cron.d &&
        echo '0 2 * * * /bin/sh /scripts/backup.sh --clean >> /var/log/backup.log 2>&1' \
          > /etc/cron.d/studytask-backup &&
        chmod 0644 /etc/cron.d/studytask-backup &&
        echo '✅ Cron-бэкап настроен (каждый день в 02:00)' &&
        /usr/sbin/crond -f -l 8
      "
    networks:
      - studytask_net

  # ── Nginx reverse proxy (раскомментировать для production) ──
  # nginx:
  #   image: nginx:alpine
  #   container_name: studytask_nginx
  #   restart: unless-stopped
  #   depends_on:
  #     - app
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
  #     - /etc/letsencrypt:/etc/letsencrypt:ro
  #   networks:
  #     - studytask_net

# ── Тома ────────────────────────────────────────────────────────────────────
volumes:
  db_data:
    name: studytask_db
  backup_data:
    name: studytask_backups

# ── Сеть ────────────────────────────────────────────────────────────────────
networks:
  studytask_net:
    name: studytask_network
    driver: bridge
